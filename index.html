<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrasi ISOPLUS RUN JAKARTA</title>

<!-- EMAIL JS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("aPYi060dsI9xgMr8O");
})();
</script>

<style>

body{
font-family:Arial;
background:#0b4c8c;
margin:0;
padding:0;
display:flex;
justify-content:center;
}

.container{
background:white;
max-width:500px;
width:95%;
margin:40px;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#0b4c8c;
}

.progress{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

.step{
width:33%;
text-align:center;
font-size:14px;
}

.bar{
height:6px;
background:#ddd;
margin-top:5px;
border-radius:5px;
}

.active .bar{
background:#ffc400;
}

.form-step{
display:none;
}

.form-step.active{
display:block;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.next{
background:#ffc400;
}

.prev{
background:#ccc;
}

.submit{
background:#0b4c8c;
color:white;
width:100%;
margin-top:20px;
}

.qris-box{
text-align:center;
background:#f5f5f5;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.qris-box img{
width:200px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>DATA DIRI</h2>

<div class="progress">

<div class="step active">
Step 1
<div class="bar"></div>
</div>

<div class="step">
Step 2
<div class="bar"></div>
</div>

<div class="step">
Step 3
<div class="bar"></div>
</div>

</div>

<form id="form-daftar">

<!-- STEP 1 -->

<div class="form-step active">

<label>Nama Lengkap</label>
<input type="text" name="nama" required>

<label>Email</label>
<input type="email" name="email" required>

<label>No WhatsApp</label>
<input type="tel" name="whatsapp" required>

<label>Jenis Kelamin</label>
<select name="gender" required>
<option value="">Pilih</option>
<option>Pria</option>
<option>Wanita</option>
</select>

<label>Tanggal Lahir</label>
<input type="date" name="lahir">

<div class="buttons">
<button type="button" class="next">Next</button>
</div>

</div>

<!-- STEP 2 -->

<div class="form-step">

<label>Kota Domisili</label>
<input type="text" name="kota">

<label>Kategori Lari</label>
<select name="kategori">
<option>5K</option>
<option>10K</option>
</select>

<label>Ukuran Jersey</label>
<select name="jersey">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<label>Kontak Darurat</label>
<input type="text" name="darurat">

<div class="buttons">

<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>

</div>

</div>

<!-- STEP 3 -->

<div class="form-step">

<div class="qris-box">
<h3>SCAN QRIS TO PAYMENT</h3>
<img src="qris.png">
<p>Silakan scan QRIS untuk melakukan pembayaran.</p>
</div>

<label>Upload KTP / Identitas</label>
<input type="file">

<label>Upload Bukti Pembayaran</label>
<input type="file">

<label>
<input type="checkbox" required>
Saya setuju dengan syarat & ketentuan lomba
</label>

<button type="submit" class="submit">
Daftar Sekarang
</button>

<div class="buttons">
<button type="button" class="prev">Back</button>
</div>

</div>

</form>

</div>

<script>

const nextBtns = document.querySelectorAll(".next");
const prevBtns = document.querySelectorAll(".prev");
const steps = document.querySelectorAll(".form-step");
const indicators = document.querySelectorAll(".step");

let current = 0;

nextBtns.forEach(btn=>{
btn.onclick=()=>{
steps[current].classList.remove("active");
indicators[current].classList.remove("active");

current++;

steps[current].classList.add("active");
indicators[current].classList.add("active");
}
})

prevBtns.forEach(btn=>{
btn.onclick=()=>{
steps[current].classList.remove("active");
indicators[current].classList.remove("active");

current--;

steps[current].classList.add("active");
indicators[current].classList.add("active");
}
})

document.getElementById("form-daftar").addEventListener("submit",function(e){

e.preventDefault();

emailjs.sendForm(
"service_uj3xa7s",
"template_u76o5d7",
this
).then(function(){

alert("Pendaftaran berhasil dikirim!");

document.getElementById("form-daftar").reset();

},function(error){

alert("Gagal mengirim data");

});

});

</script>

</body>
</html>
